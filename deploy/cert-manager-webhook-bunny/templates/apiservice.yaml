apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.{{ .Values.groupName }}
  labels:
    {{- include "cert-manager-webhook-bunny.labels" . | nindent 4 }}
  annotations:
    # This annotation tells cert-manager's cainjector to inject the CA bundle
    # from the serving certificate into this APIService's caBundle field.
    cert-manager.io/inject-ca-from: "{{ .Release.Namespace }}/{{ include "cert-manager-webhook-bunny.servingCertificate" . | trim }}"
spec:
  group: {{ .Values.groupName }}
  groupPriorityMinimum: 1000
  versionPriority: 15
  service:
    name: {{ include "cert-manager-webhook-bunny.fullname" . }}
    namespace: {{ .Release.Namespace | quote }}
  version: v1alpha1
  insecureSkipTLSVerify: false
