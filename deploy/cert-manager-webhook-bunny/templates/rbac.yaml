---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "cert-manager-webhook-bunny.labels" . | nindent 4 }}

---
# Grant the webhook pod the ability to read Secrets so it can fetch provider API keys.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}:secret-reader
  labels:
    {{- include "cert-manager-webhook-bunny.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - "secrets"
    verbs:
      - "get"
      - "watch"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}:secret-reader
  labels:
    {{- include "cert-manager-webhook-bunny.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}:secret-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-bunny.fullname" . }}
    namespace: {{ .Release.Namespace | quote }}

---
# Grant cert-manager the ability to use this DNS01 solver webhook.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}:domain-solver
  labels:
    {{- include "cert-manager-webhook-bunny.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - {{ .Values.groupName | quote }}
    resources:
      - "*"
    verbs:
      - "create"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}:domain-solver
  labels:
    {{- include "cert-manager-webhook-bunny.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}:domain-solver
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ .Values.certManager.serviceAccountName }}
    namespace: {{ .Values.certManager.namespace | quote }}

---
# Allow the webhook to make SubjectAccessReviews (required by the API aggregation layer).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}:auth-delegator
  labels:
    {{- include "cert-manager-webhook-bunny.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-bunny.fullname" . }}
    namespace: {{ .Release.Namespace | quote }}

---
# Allow the webhook to read the extension-apiserver-authentication ConfigMap in kube-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cert-manager-webhook-bunny.fullname" . }}:webhook-authentication-reader
  namespace: kube-system
  labels:
    {{- include "cert-manager-webhook-bunny.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-bunny.fullname" . }}
    namespace: {{ .Release.Namespace | quote }}
