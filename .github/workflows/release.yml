name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}   # each job declares its own

# Build each platform natively (no QEMU) then merge into a single multi-arch
# manifest list so every architecture shares one tag / digest.
#
#  build    ──(linux/amd64)──> ubuntu-latest (x64)  ──┐ digest only
#  build    ──(linux/arm64)──> ubuntu-24.04-arm      ──┤
#  merge    ──────────────────────────────────────────> manifest list
#  release  ──────────────────────────────────────────> GitHub Release (notes)
#  hooks    ──(linux/amd64)──> ubuntu-latest (x64)  ──┐ certbot binaries
#  hooks    ──(linux/arm64)──> ubuntu-24.04-arm      ──┘
#  chart    ──────────────────────────────────────────> OCI helm push

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build each platform on a matching native runner
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      id-token: write        # needed for Sigstore-based attestation
      attestations: write    # needed to persist attestation bundles
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}

      # Push to registry by digest only — no tag yet (the merge job handles that).
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: >-
            type=image,
            name=ghcr.io/${{ github.repository }},
            push-by-digest=true,
            name-canonical=true,
            push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Save the digest so the merge job can reference it.
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Merge platform digests into a single multi-arch manifest list
  # ─────────────────────────────────────────────────────────────────────────
  merge:
    name: Merge manifest list
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write

    steps:
      - name: Download all digest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # imagetools create writes the OCI manifest list; -t flags come from jq
      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect manifest list
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Create the GitHub Release with auto-generated release notes
  #    The hooks job uploads its binaries to this release once it exists.
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Build certbot hook binaries and attach them to the GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  hooks:
    name: Build certbot hook (${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: release   # release must exist before we upload to it
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} go build \
            -trimpath \
            -ldflags="-s -w" \
            -o bunny-certbot-hook-linux-${{ matrix.goarch }} \
            ./cmd/certbot-hook

      - name: Upload binary to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" bunny-certbot-hook-linux-${{ matrix.goarch }} --repo "$GITHUB_REPOSITORY"

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Package and push the Helm chart as an OCI artifact
  # ─────────────────────────────────────────────────────────────────────────
  chart:
    name: Push Helm chart (OCI)
    runs-on: ubuntu-latest
    needs: merge      # ensure the image exists before publishing the chart
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Derive chart version from tag (strips leading v)
        id: chart
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        # VERSION already has the leading 'v' stripped (e.g. 1.0.2).
        # Using it for both --version and --app-version ensures the chart's
        # appVersion matches the Docker image tag exactly.
        run: |
          helm package deploy/cert-manager-webhook-bunny \
            --version "${{ steps.chart.outputs.VERSION }}" \
            --app-version "${{ steps.chart.outputs.VERSION }}"

      - name: Push Helm chart to GHCR OCI registry
        run: |
          helm push \
            cert-manager-webhook-bunny-${{ steps.chart.outputs.VERSION }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
