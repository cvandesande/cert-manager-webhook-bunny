name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Docker image ────────────────────────────────────────────────────────

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Helm chart (OCI) ────────────────────────────────────────────────────

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Derive chart version from tag (strips leading v)
        id: chart
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: |
          helm package deploy/cert-manager-webhook-bunny \
            --version "${{ steps.chart.outputs.VERSION }}" \
            --app-version "${{ github.ref_name }}"

      - name: Push Helm chart to GHCR OCI registry
        run: |
          helm push \
            cert-manager-webhook-bunny-${{ steps.chart.outputs.VERSION }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
